<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Santa Rosa Malhas | Consulta de Estoque</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <link rel="icon" href="logo.png">

</head>

<body>

    <div class="background"></div>

    <main class="container">

        <div class="logo-area">

            <img src="logo.png"
                class="logo"
                alt="Santa Rosa Malhas">

            <h1>Consulta de Estoque</h1>

            <p>

                Digite o código do produto para consultar o estoque.

            </p>

        </div>

        <div class="search-box">

            <div class="input-area">

                <i class="fa-solid fa-barcode"></i>

                <input
                    id="codigo"
                    type="text"
                    placeholder="Digite o ID do Produto"
                    autocomplete="off"
                    autofocus>

            </div>

            <button id="btnPesquisar">

                <i class="fa-solid fa-magnifying-glass"></i>

                Pesquisar

            </button>

            <a
                id="btnMovimentar"
                class="btnLeitor"
                href="movimentar.html">
            
                <i class="fa-solid fa-box-open"></i>
            
                Movimentar Estoque
            
            </a>

            <a href="leitor.html" class="btnLeitor">
                <i class="fa-solid fa-qrcode"></i>
                Ler QR Code
            </a>

        </div>

        <div
            id="loading"
            class="loading hidden">

            <div class="spinner"></div>

            <span>

                Consultando estoque...

            </span>

        </div>

        <section
            id="resultado"
            class="resultado hidden">

            <div class="card-produto">

                <div class="status">

                    <i class="fa-solid fa-circle-check"></i>

                    Produto Encontrado

                </div>

                <div class="fotoProduto">

                    <img
                        id="fotoProduto"
                        src=""
                        alt="Imagem do Produto">

                </div>

                <div class="linha">

                    <span>ID</span>

                    <strong id="resId"></strong>

                </div>

                <div class="linha">

                    <span>Nome do Produto</span>

                    <strong id="resNome"></strong>

                </div>

                <div class="linha">

                    <span>Quantidade em Estoque</span>

                    <strong id="resQtd"></strong>

                </div>

                <div
                    id="estoqueStatus"
                    class="estoque-status">

                </div>
                            </div>

        </section>

        <section
            id="naoEncontrado"
            class="nao-encontrado hidden">

            <i class="fa-solid fa-circle-xmark"></i>

            <h2>

                Produto não encontrado

            </h2>

            <p>

                Nenhum produto foi localizado com esse código.

            </p>

        </section>

    </main>

    <footer>

        © <span id="ano"></span> Santa Rosa Malhas | v2.2

    </footer>

    <script src="script.js"></script>

</body>

</html>
